name: Publish Test Environment
# Deploys the test environment to GitHub Pages on push to master or manual trigger

on:
  push:
    branches: ['master']
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build testenv
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NODE_ENV: development
      TESTENV_BRANCH_NAME: ${{ github.ref_name }}
      TESTENV_COMMIT_SHA: ${{ github.sha }}

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b

      - name: Use Node.js 22.21.1
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.21.1

      - name: Set up pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@11.1.1 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build test environment
        run: pnpm run testenv:create

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b
        with:
          path: testenv

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
