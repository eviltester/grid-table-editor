version: '3.9'
services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "8080:80"
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3000:3000"
  mcp:
    build:
      context: .
      dockerfile: apps/mcp/Dockerfile
    stdin_open: true
    tty: true
