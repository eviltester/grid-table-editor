name: Codex PR Review

on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: codex-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  codex-review:
    if: github.event.pull_request.draft == false && secrets.OPENAI_API_KEY != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify OpenAI key is configured
        shell: bash
        run: |
          if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "OPENAI_API_KEY is not configured for this run."
            exit 1
          fi

      - name: Run Codex PR review
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            Review this pull request for:
            - bugs and behavioral regressions
            - security or reliability risks
            - missing or weak tests
            Keep feedback concise and actionable with file/line references.
